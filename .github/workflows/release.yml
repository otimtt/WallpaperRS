name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "WallpaperRS-$version-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target\x86_64-pc-windows-msvc\release\wallpaper-rs.exe" "$dir\"
          Copy-Item "README.md" "$dir\"
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WallpaperRS ${{ github.ref_name }}"
          body: |
            ## Download

            **Windows x64** — baixe o `.zip`, extraia e execute `wallpaper-rs.exe`.

            ### Requisitos
            - Windows 10 / 11 (64-bit)
            - GPU com suporte a DirectX 12
            - [WebView2 Runtime](https://developer.microsoft.com/microsoft-edge/webview2/) (apenas para wallpapers Web — já vem pré-instalado no Windows 11)

            ### Wallpapers de vídeo
            Aponte o caminho para um arquivo `.mp4` ou `.webm` na biblioteca.
          files: WallpaperRS-${{ github.ref_name }}-windows-x64.zip
          draft: false
          prerelease: false
